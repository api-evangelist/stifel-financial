aid: stifel-financial
name: Stifel Financial
description: >-
  Stifel Financial is a financial services holding company whose subsidiaries provide
  securities brokerage, investment banking, trading, investment advisory, and related
  financial services to individual investors, corporations, and government entities.
  Stifel bank accounts are accessible via open banking data aggregators including
  Plaid and Finicity (Mastercard) for third-party financial applications.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Finance
  - Wealth Management
  - Investment Banking
  - Open Banking
  - Financial Services
url: >-
